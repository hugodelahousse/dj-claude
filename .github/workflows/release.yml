name: Release
on:
  push:
    branches:
      - main
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - uses: changesets/action@v1
        id: changesets
        with:
          version: bunx @changesets/cli version
          commitMode: github-api
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}

      - name: Check if release needed
        if: steps.changesets.outputs.hasChangesets == 'false'
        id: check
        run: |
          VERSION="v$(jq -r .version package.json)"
          if gh release view "$VERSION" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build binaries
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p dist
          for target in bun-darwin-arm64 bun-darwin-x64 bun-linux-x64 bun-linux-arm64; do
            name="dj-claude-${target#bun-}"
            bun build --compile --minify --target=$target src/index.ts --outfile "dist/$name"
          done

      - name: Extract changelog for current version
        if: steps.check.outputs.exists == 'false'
        id: changelog
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          # Strip leading 'v' to match CHANGELOG.md headers
          SEMVER="${VERSION#v}"
          # Extract the section for this version (between ## $SEMVER and the next ## heading)
          BODY=$(awk "/^## ${SEMVER}\$/{found=1; next} /^## /{if(found) exit} found{print}" CHANGELOG.md)
          echo "body<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check.outputs.version }}
          files: dist/*
          body: ${{ steps.changelog.outputs.body }}
